# Render – frontend Angular (SSR)
# Po połączeniu repo w Renderze: New → Web Service, wybierz ten plik lub skonfiguruj ręcznie.
# W backendzie (Render) ustaw CORS_ORIGIN na URL tego serwisu, np. https://mechanical-shop-frontend.onrender.com

services:
  - type: web
    name: mechanical-shop-frontend
    runtime: node
    region: frankfurt

    buildCommand: npm ci && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_VERSION
        value: 20
