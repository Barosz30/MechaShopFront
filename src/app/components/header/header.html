<header class="navbar">
  <div class="logo" routerLink="/">Warsztat 🚗</div>

  <nav class="nav-center">
    <a routerLink="/">Start</a>
    <a routerLink="/items">Wszystkie</a>
    <a routerLink="/items/new" class="nav-btn-primary">Dodaj nowy</a>
  </nav>

  <div class="nav-right">
    <button type="button" class="theme-toggle" (click)="themeService.toggleTheme()" [attr.aria-label]="themeService.isDark() ? 'Włącz motyw jasny' : 'Włącz motyw ciemny'" [title]="themeService.isDark() ? 'Motyw jasny' : 'Motyw ciemny'">
      @if (themeService.isDark()) {
        <span class="theme-icon theme-icon-sun" aria-hidden="true">☀️</span>
      } @else {
        <span class="theme-icon theme-icon-moon" aria-hidden="true">🌙</span>
      }
    </button>
    <a routerLink="/cart" class="cart-link">
      Koszyk ({{ cartService.items().length }})
    </a>
    @if (authService.currentUser(); as user) {
      <div class="user-menu">
        <a routerLink="/profile" class="avatar-link" [title]="'Profil: ' + user.username">
          <span class="avatar">{{ getInitials(user.username) }}</span>
        </a>

        <button class="logout-btn" (click)="logout()">
          Wyloguj
        </button>
      </div>
    } @else {
      <button class="login-btn" (click)="isModalOpen.set(true)">
        Zaloguj
      </button>
    }
  </div>
</header>

@if (isModalOpen()) {
  <app-login-modal (close)="isModalOpen.set(false)"></app-login-modal>
}
