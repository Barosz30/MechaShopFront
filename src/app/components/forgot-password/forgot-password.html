<div class="auth-card">
  <h1>Odzyskaj hasło</h1>
  <p class="hint">Podaj email/login używany do logowania.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label for="username">Email</label>
    <input id="username" type="email" formControlName="username" autocomplete="email" />

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
    @if (message()) {
      <p class="success">{{ message() }}</p>
    }

    <button type="submit" class="btn btn-primary" [disabled]="isLoading()">
      {{ isLoading() ? 'Przetwarzanie...' : 'Wyślij link resetu' }}
    </button>
  </form>
</div>
