<div class="shop-items-list-container">
  <h2>Przedmioty w sklepie</h2>

  <div *ngIf="loading()" class="state-message">
    Ładowanie listy przedmiotów...
  </div>

  <div *ngIf="error()" class="state-message error">
    {{ error() }}
  </div>

  <div *ngIf="!loading() && !error() && items().length === 0" class="state-message">
    Brak przedmiotów do wyświetlenia.
  </div>

  <div class="items-grid" *ngIf="!loading() && !error() && items().length > 0">
    <a
      class="item-card"
      *ngFor="let item of items()"
      [routerLink]="['/item', item.id]">
      <div class="item-image-container" *ngIf="getThumbnailUrl(item.imageUrl)">
        <img 
          [src]="getThumbnailUrl(item.imageUrl)!" 
          [alt]="item.name"
          class="item-thumbnail"
          loading="lazy"
          (error)="onImageError($event, item)"
          (load)="onImageLoad($event, item)">
      </div>
      <div class="item-header">
        <h3>{{ item.name }}</h3>
      </div>
      <div class="item-body">
        <span class="price">
          {{ item.price | currency:'PLN':'symbol':'1.0-0' }}
        </span>
        <span
          class="availability"
          [class.available]="item.isAvailable"
          [class.unavailable]="!item.isAvailable">
          {{ item.isAvailable ? 'Dostępny' : 'Niedostępny' }}
        </span>
      </div>
    </a>
  </div>

  <!-- Paginacja -->
  <div class="pagination-container" *ngIf="!loading() && !error() && items().length > 0">
    <div class="pagination">
      <button 
        class="pagination-btn"
        [class.disabled]="currentPage() === 1"
        [disabled]="currentPage() === 1"
        (click)="previousPage()">
        ← Poprzednia
      </button>
      
      <div class="pagination-info">
        Strona {{ currentPage() }}
      </div>
      
      <button 
        class="pagination-btn"
        [class.disabled]="!hasMoreItems()"
        [disabled]="!hasMoreItems()"
        (click)="nextPage()">
        Następna →
      </button>
    </div>
  </div>
</div>
