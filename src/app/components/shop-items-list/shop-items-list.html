<div class="shop-items-list-container">
  <button (click)="goBack()" class="back-btn">
    <span class="back-icon">←</span>
    <span>Wróć</span>
  </button>

  <h2>Przedmioty w sklepie</h2>

  <div *ngIf="loading()" class="state-message">
    Ładowanie listy przedmiotów...
  </div>

  <div *ngIf="error()" class="state-message error">
    {{ error() }}
  </div>

  <div *ngIf="!loading() && !error() && items().length === 0" class="state-message">
    Brak przedmiotów do wyświetlenia.
  </div>

  <div class="items-grid" *ngIf="!loading() && !error() && items().length > 0">
    <a
      class="item-card"
      *ngFor="let item of items()"
      [routerLink]="['/item', item.id]"
      [state]="getCurrentQueryParams()">
      <div 
        class="item-image-container" 
        *ngIf="getThumbnailUrl(item.imageUrl) && !failedImageIds().has(item.id)"
        #imageContainer
        (mousemove)="onImageMouseMove($event, imageContainer)"
        (mouseleave)="onImageMouseLeave(imageContainer)">
        <img 
          [src]="getThumbnailUrl(item.imageUrl)!" 
          [alt]="item.name"
          class="item-thumbnail"
          [class.loaded]="loadedImageIds().has(item.id)"
          loading="lazy"
          (error)="onImageError(item)"
          (load)="onImageLoad(item)">
        <div class="item-image-skeleton" *ngIf="!loadedImageIds().has(item.id)" aria-hidden="true"></div>
      </div>
      <div class="item-header">
        <h3>{{ item.name }}</h3>
      </div>
      <div class="item-body">
        <span class="price">
          {{ item.price | currency:'PLN':'symbol':'1.0-0' }}
        </span>
        <span
          class="availability-badge"
          [class.available]="item.isAvailable"
          [class.unavailable]="!item.isAvailable">
          {{ item.isAvailable ? 'Dostępny' : 'Niedostępny' }}
        </span>
      </div>
    </a>
  </div>

  <!-- Paginacja -->
  <div class="pagination-container" *ngIf="!loading() && !error() && items().length > 0">
    <div class="pagination">
      <button 
        *ngIf="currentPage() > 1"
        class="pagination-btn"
        (click)="previousPage()">
        ← Poprzednia
      </button>
      
      <div class="pagination-info">
        Strona {{ currentPage() }}
      </div>
      
      <button 
        *ngIf="hasMoreItems()"
        class="pagination-btn"
        (click)="nextPage()">
        Następna →
      </button>
    </div>
  </div>
</div>
