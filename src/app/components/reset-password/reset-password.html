<div class="auth-card">
  <h1>Ustaw nowe hasło</h1>
  <p class="hint">Wklej token resetu i ustaw nowe hasło.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label for="token">Token resetu</label>
    <textarea id="token" formControlName="token" rows="3"></textarea>

    <label for="newPassword">Nowe hasło</label>
    <input id="newPassword" type="password" formControlName="newPassword" autocomplete="new-password" />

    <label for="confirmPassword">Powtórz nowe hasło</label>
    <input id="confirmPassword" type="password" formControlName="confirmPassword" autocomplete="new-password" />

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
    @if (message()) {
      <p class="success">{{ message() }}</p>
    }

    <button type="submit" class="btn btn-primary" [disabled]="isLoading()">
      {{ isLoading() ? 'Przetwarzanie...' : 'Zresetuj hasło' }}
    </button>

    <a routerLink="/" class="back-link">Wróć na stronę główną</a>
  </form>
</div>
