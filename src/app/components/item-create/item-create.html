<div class="item-create-container">
  <h2>Dodaj nowy przedmiot</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="field">
      <label for="name">Nazwa</label>
      <input id="name" type="text" formControlName="name" />
    </div>

    <div class="field">
      <label for="price">Cena (PLN)</label>
      <input id="price" type="number" formControlName="price" />
    </div>

    <div class="field">
      <label for="description">Opis</label>
      <textarea id="description" rows="3" formControlName="description"></textarea>
    </div>

    <div class="field">
      <label for="categoryId">Kategoria (opcjonalna)</label>
      <select id="categoryId" formControlName="categoryId">
        <option [ngValue]="null">— Brak kategorii</option>
        @for (cat of categories(); track cat.id) {
          <option [ngValue]="cat.id">{{ cat.name }}</option>
        }
      </select>
    </div>

    <div class="field">
      <label for="image">Obrazek produktu (opcjonalny)</label>
      <input id="image" type="file" accept="image/*" (change)="onFileChange($event)" />
    </div>

    <div *ngIf="error()" class="state-message error">
      {{ error() }}
    </div>

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Zapisywanie...' : 'Zapisz przedmiot' }}
    </button>
  </form>
</div>
